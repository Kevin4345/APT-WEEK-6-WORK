  <!DOCTYPE html>

<!--JAVASCRIPT IN HTML-->
<!--ADDING 2 NUMBERS-->
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>First program in Javascript</title>
        <script type="text/javascript">
            var firstNumber;
            var secondNumber;
            var number1;
            var number2;
            var sum;

            firstNumber = window.prompt("Enter first intger");
            secondNumber = window.prompt("Enter second integer");
            number1= parseInt(firstNumber);
            number2= parseInt(secondNumber);
            sum = number1 + number2;
            document.write("<h1> The sum is "+sum+"</h1>");

        

        </script> 
    </head>
    <body>
    </body>
</html>
